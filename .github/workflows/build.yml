name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile-check:
    name: Compile-check on FPP ${{ matrix.fpp-tag }}
    runs-on: ubuntu-22.04
    container:
      image: falconchristmas/fpp:${{ matrix.fpp-tag }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        fpp-tag: ["v8.5", "master"]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure build tools
        run: |
          if ! command -v make >/dev/null 2>&1 || ! command -v g++ >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y --no-install-recommends build-essential ccache
          fi

      - name: Compile-check plugin source
        run: |
          # The FPP image has FPP source at /opt/fpp/src and all deps already
          # installed. Compile-only against those headers — we don't have
          # libfpp.so available to link against in a runtime image, but every
          # error we've hit so far has been compile-time.
          test -d /opt/fpp/src || { echo "::error::No /opt/fpp/src in FPP image"; ls /opt/fpp; exit 1; }
          make src/FPPMask.o
